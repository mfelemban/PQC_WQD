[server]
headless = true
enableCORS = false
enableXsrfProtection = false

[browser]
gatherUsageStats = false

[theme]
base = "light"
primaryColor = "#1565C0"
backgroundColor = "#ffffff"
secondaryBackgroundColor = "#f0f4ff"
textColor = "#1a1a2e"
font = "sans serif"

[client]
showSidebarNavigation = false
toolbarMode = "minimal"
